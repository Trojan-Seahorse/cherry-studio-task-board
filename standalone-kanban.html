<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cardo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/regular/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/fill/style.css">
<style>
/* ═══════════════════════════════════════════════
   Cardo · Claire 精确复刻 v3
   像素数据来源: app.weclaire.com (浅色模式, 19 卡片填充)
   提取日期: 2026-06-16  |  字体: Plus Jakarta Sans (Boing 替代)
   ═══════════════════════════════════════════════ */

/* ═══════════ CLAIRE LIGHT MODE ═══════════ */
:root {
  --bg-page:           #FFFFFF;
  --bg-view:           #FFFFFF;
  --bg-sidebar:        #FFFFFF;
  --text-sidebar-nav:   #374151;
  --bg-column:         #FAFAFA;
  --bg-card:           #FFFFFF;
  --bg-card-hover:     #F9F9F9;
  --bg-input:          #FFFFFF;
  --bg-btn:            #F5F5F5;
  --bg-btn-hover:      #EBEBEB;
  --border-card:       #E7E7E7;
  --border-column:     #EFEFEF;
  --border-sidebar:    #EAECF0;
  --border-btn:        #E0E0E0;
  --border-subtle:     rgba(0,0,0,0.06);
  --border-visible:    rgba(0,0,0,0.10);
  --text-primary:      #111827;
  --text-secondary:    #6B7280;
  --text-tertiary:     #9CA3AF;
  --text-inverse:      #FFFFFF;
  --primary:           #151516;
  --primary-hover:     #1E293B;
  --danger:            #D92D20;
  --danger-bg:         #FEE4E2;
  --pri-high-bg:       #FEF3E2;
  --pri-high-color:    #F59E0B;
  --pri-urgent-bg:     #FCEDF0;
  --pri-urgent-color:  #C32D3C;
  --pri-medium-bg:     #EFF6FF;
  --pri-medium-color:  #337EA9;
  --pri-low-bg:        #F3F4F6;
  --pri-low-color:     #6B7280;
  --shadow-card:       rgba(10,10,10,0.06) 0px 1.2px 1.2px 0px, rgba(10,10,10,0.04) 0px 5px 10px 0px;
  --shadow-card-hover: rgba(0,0,0,0.08) 0px 4px 12px;
  --border-card-hover: #D4D4D4;
  --bg-nav-hover:      #F3F4F6;
  --bg-colmenu-hover:  #F3F4F6;
  --colmenu-hover-color:#374151;
  --addbtn-hover-bg:   #1F1F1F;
  --addbtn-hover-color:#F1F5F9;
  --shadow-btn-hover:  rgba(0,0,0,0.08) 0px 4px 12px;
  --avatar-gradient:   linear-gradient(225deg, rgb(57,106,252) 0%, rgba(0,0,0,0) 55%), linear-gradient(25deg, rgb(0,219,222) 0%, rgba(0,0,0,0) 55%), linear-gradient(135deg, rgb(56,182,255) 0%, rgb(82,113,255) 100%);
  --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px; --radius-xl: 16px;
  --sidebar-w: 220px; --column-w: 340px; --column-gap: 18px;
  --font: Inter, system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-display: "Plus Jakarta Sans", "Boing", Inter, system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  --dur: 200ms; --ease: cubic-bezier(.4,0,.2,1);
}

/* ═══════════ CLAIRE DARK MODE ═══════════ */
[data-theme="dark"] {
  --bg-page:           #0A0A0A;
  --bg-view:           #141414;
  --bg-sidebar:        #141414;
  --bg-column:         #111111;
  --bg-card:           #161616;
  --bg-card-hover:     #1A1A1A;
  --bg-input:          #1F1F1F;
  --bg-btn:            #1F1F1F;
  --bg-btn-hover:      #2A2A2A;
  --border-card:       #1E1E1E;
  --border-column:     #1E1E1E;
  --border-sidebar:    #1E1E1E;
  --border-btn:        #2A2A2A;
  --border-subtle:     rgba(255,255,255,0.06);
  --border-visible:    rgba(255,255,255,0.08);
  --text-primary:      #CBD5E1;
  --text-secondary:    #969696;
  --text-tertiary:     #6B7280;
  --text-inverse:      #0A0A0A;
  --primary:           #F1F5F9;
  --primary-hover:     #FFFFFF;
  --danger:            #F04438;
  --danger-bg:         #7A271A;
  --pri-high-bg:       #422006;
  --pri-high-color:    #F59E0B;
  --pri-urgent-bg:     #490D0D;
  --pri-urgent-color:  #F04438;
  --pri-medium-bg:     #0C2D48;
  --pri-medium-color:  #60A5FA;
  --pri-low-bg:        #1F2937;
  --pri-low-color:     #9CA3AF;
  --shadow-card:       rgba(0,0,0,0.5) 0px 1px 2px 0px;
  --shadow-card-hover: rgba(0,0,0,0.08) 0px 4px 12px;
  --border-card-hover: #333333;
  --bg-nav-hover:      #1F1F1F;
  --bg-colmenu-hover:  #1F1F1F;
  --colmenu-hover-color:#CBD5E1;
  --addbtn-hover-bg:   #F1F5F9;
  --addbtn-hover-color:#0A0A0A;
  --shadow-btn-hover:  rgba(0,0,0,0.5) 0px 4px 12px;
  --avatar-gradient:   linear-gradient(225deg, rgb(57,106,252) 0%, rgba(0,0,0,0) 55%), linear-gradient(25deg, rgb(0,219,222) 0%, rgba(0,0,0,0) 55%), linear-gradient(135deg, rgb(56,182,255) 0%, rgb(82,113,255) 100%);
}

/* ═══════════ RESET ═══════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:var(--font);font-size:16px;line-height:1.5;
  background:var(--bg-page);color:var(--text-primary);
  height:100vh;overflow:hidden;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
}
button{font-family:inherit}
input,textarea,select{font-family:inherit}

/* ═══════════ APP SHELL ═══════════ */
.app-root{display:flex;flex-direction:row;height:100vh;background:var(--bg-page)}

/* ═══════════ SIDEBAR ═══════════ */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:transparent;
  display:flex;flex-direction:column;
  padding:0;overflow-y:auto;
}
.sidebar.collapsed{width:56px;overflow-y:auto;overflow-x:hidden}
.sidebar.collapsed .sb-top-bar{justify-content:center;padding:12px 0 8px}
.sidebar.collapsed .sb-brand{display:none}
.sidebar.collapsed .sb-user-wrap{justify-content:center;padding:8px 0 12px;margin-top:auto}
.sidebar.collapsed .sb-user-wrap .avatar{margin:0}
.sidebar.collapsed .sb-user-wrap span{display:none}
.sidebar.collapsed .sb-create-wrap{padding:0 8px 12px}
.sidebar.collapsed .sb-create-btn{justify-content:center;padding:9px 0;gap:0}
.sidebar.collapsed .sb-create-btn span,.sidebar.collapsed .sb-create-btn::after{display:none}
.sidebar.collapsed .sidebar-nav .nav-section-space{display:flex;flex-direction:column;align-items:center;gap:2px}
.sidebar.collapsed .sidebar-nav-item{justify-content:center;padding:10px 0;gap:0;margin:0;border-radius:var(--radius-md)}
.sidebar.collapsed .sidebar-nav-item span,.sidebar.collapsed .sidebar-nav-item::after{display:none}
.sidebar.collapsed .sidebar-nav-item i{margin:0}
.sidebar.collapsed .nav-section-header{display:none}
.sidebar.collapsed .sb-board-list{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0}
.sidebar.collapsed .sb-board-item{justify-content:center;padding:8px 0;gap:0;margin:0}
.sidebar.collapsed .sb-board-item span,.sidebar.collapsed .sb-board-item i,.sidebar.collapsed .sb-board-item::after{display:none}
.sidebar.collapsed .sb-board-item .dot{display:block;margin:0}
.sidebar.collapsed .sb-stats{display:none}

/* Top bar: brand + collapse */
.sb-top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px 8px;flex-shrink:0;
}
.sb-brand{
  font-family:var(--font-display);font-size:18px;font-weight:500;
  color:var(--text-primary);letter-spacing:-0.3px;
}
.sb-collapse-btn{
  width:30px;height:30px;border-radius:var(--radius-sm);
  border:none;background:none;cursor:pointer;
  color:var(--text-secondary);
  display:flex;align-items:center;justify-content:center;
  transition:all var(--dur) var(--ease);
  flex-shrink:0;
}
.sb-collapse-btn:hover{background:var(--bg-nav-hover);color:var(--text-primary)}
.sb-collapse-btn i{font-size:18px}

/* User at bottom */
.sb-user-wrap{
  display:flex;align-items:center;gap:8px;
  padding:12px 16px 12px;
}
.sb-user-wrap span{font-size:15px;font-weight:500;color:var(--text-sidebar-nav);white-space:nowrap;overflow:hidden}
.sb-user-wrap .avatar{
  width:26px;height:26px;border-radius:50%;
  font-size:11px;
  background:var(--avatar-gradient);
  border:1.6px solid #FFFFFF;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:0;font-weight:600;flex-shrink:0;
  font-family:var(--font-display);
}

/* Create board button wrapper */
.sb-create-wrap{padding:4px 16px 16px}
.sb-create-btn{
  width:100%;padding:9px 16px;border-radius:var(--radius-md);
  border:0.8px solid var(--border-btn);background:var(--bg-btn);
  color:var(--text-primary);font-family:var(--font-display);font-size:14px;font-weight:400;
  cursor:pointer;display:flex;align-items:center;gap:9px;
  transition:all var(--dur) var(--ease);
}
.sb-create-btn:hover{background:var(--bg-btn-hover)}

/* Nav items */
.sidebar-nav{display:flex;flex-direction:column}
.sidebar-nav-item{
  display:flex;align-items:center;gap:8px;
  padding:10px 16px;margin:0 0 1px;
  border:none;background:none;width:100%;
  font-family:inherit;font-size:15px;font-weight:400;
  color:var(--text-sidebar-nav);cursor:pointer;text-decoration:none;
  border-radius:var(--radius-md);
  transition:background-color 0.2s, color 0.2s;
}
.sidebar-nav-item:hover{background:var(--bg-nav-hover);color:var(--text-primary)}
.sidebar-nav-item.active{background:var(--bg-nav-hover);color:var(--text-primary)}
.sidebar-nav-item i{font-size:20px;flex-shrink:0;color:var(--text-secondary)}

/* Section spacer in nav */
.nav-section-space{padding:0}
.nav-section-header{
  padding:14px 16px 8px;margin-top:16px;
  border-top:0.8px solid var(--border-subtle);
  font-size:13px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;
}

/* Board items in sidebar */
.sb-board-list{display:flex;flex-direction:column}
.sb-board-item{
  display:flex;align-items:center;gap:14px;
  padding:10px 16px;margin:0 0 2px;border:none;background:none;width:100%;
  font-family:inherit;font-size:15px;color:var(--text-sidebar-nav);cursor:pointer;
  border-radius:var(--radius-md);
  transition:0.2s;
}
.sb-board-item:hover{background:var(--bg-nav-hover)}
.sb-board-item .dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}

/* Stats */
.sb-stats{
  padding:12px 24px 12px 28px;margin-top:auto;
  border-top:0.8px solid var(--border-subtle);
  font-size:13px;color:var(--text-secondary);
  display:flex;flex-direction:column;gap:3px;
}
.sb-stats b{color:var(--text-primary)}
.stat-row{display:flex;justify-content:space-between;align-items:center}
.stat-row span{color:var(--text-secondary)}

/* ═══════════ MAIN VIEW ═══════════ */
.main-view{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg-view);position:relative}

/* ═══════════ VIEW HEADER (Claire tab bar style) ═══════════ */
.view-header{
  flex-shrink:0;display:flex;align-items:flex-end;
  padding:26px 24px 0 0;gap:12px;
}
.view-header-left{flex:1;min-width:0;display:flex;flex-direction:column;gap:40px;padding-left:24px}
.view-header-title-row{display:flex;align-items:center;gap:16px}
.proj-icon-wrap{
  width:60px;height:60px;border-radius:50%;
  background:var(--primary);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
  transition:opacity .15s;
}
.proj-icon-wrap:hover{opacity:0.85}
.proj-icon{font-size:32px;color:#fff;transition:none}
.view-header-title{font-family:var(--font-display);font-size:36px;font-weight:500;color:var(--text-primary);padding:0;background:none;border:none;outline:none;line-height:1.2;margin:0}
.view-header-desc{font-family:inherit;font-size:16px;color:var(--text-tertiary);padding:2px 0 0 6px;line-height:1.5;min-height:20px;max-width:85%;max-height:48px;outline:none;border:none;cursor:text;transition:color .15s;overflow-y:hidden;scrollbar-width:none}
.view-header-desc::-webkit-scrollbar{display:none}
.view-header-desc:hover,.view-header-desc:focus{overflow-y:auto}
.view-header-desc:empty::before{content:attr(data-placeholder);color:var(--text-tertiary);opacity:0.6}
.view-header-desc:focus{color:var(--text-secondary)}
.desc-counter{display:none;font-size:11px;color:var(--text-tertiary);padding:0}
.desc-counter.visible{display:block;opacity:0.6}
.desc-counter.over{color:var(--danger);opacity:1}
.view-header-right{display:flex;align-items:center;gap:8px;padding-bottom:2px;flex-shrink:0}

/* Filter button */
.filter-btn{
  padding:8px 14px;border-radius:var(--radius-md);
  border:0.8px solid var(--border-card);background:var(--bg-card);
  color:var(--text-primary);font-family:var(--font-display);font-size:14px;cursor:pointer;
  transition:border-color .2s, box-shadow .2s;
}
.filter-btn:hover{border-color:var(--border-card-hover);box-shadow:var(--shadow-btn-hover)}

/* Theme toggle */
.theme-btn{
  width:32px;height:32px;border-radius:var(--radius-sm);
  border:0.8px solid var(--border-btn);background:var(--bg-btn);
  color:var(--text-secondary);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--dur) var(--ease);
  font-family:inherit;
}
.theme-btn:hover{color:var(--text-primary);border-color:var(--border-visible)}
.theme-btn i{font-size:18px}

/* Header action buttons */
.hdr-btn{
  padding:6px 12px;border-radius:var(--radius-md);
  border:0.8px solid var(--border-card);background:var(--bg-card);
  color:var(--text-primary);font-family:var(--font-display);font-size:14px;cursor:pointer;
  display:flex;align-items:center;gap:6px;white-space:nowrap;
  transition:border-color .2s, box-shadow .2s;
}
.hdr-btn:hover{border-color:var(--border-card-hover);box-shadow:var(--shadow-btn-hover)}
.hdr-btn i{font-size:14px}

/* More menu dropdown */
.hdr-more-wrap{position:relative}
.hdr-more-menu{
  display:none;position:absolute;top:100%;right:0;margin-top:6px;z-index:100;
  background:var(--bg-view);border:0.8px solid var(--border-visible);border-radius:var(--radius-md);
  padding:4px;min-width:160px;box-shadow:0 8px 32px rgba(0,0,0,.12);
}
.hdr-more-menu.show{display:block}
.hdr-more-menu button{
  display:flex;align-items:center;gap:8px;width:100%;
  padding:8px 12px;border:none;background:none;
  font-family:inherit;font-size:13px;color:var(--text-secondary);cursor:pointer;
  border-radius:6px;transition:background .15s;
}
.hdr-more-menu button:hover{background:var(--bg-nav-hover);color:var(--text-primary)}
.hdr-more-menu button i{font-size:14px;flex-shrink:0}

/* ═══════════ BOARD ═══════════ */
.board{
  flex:1;display:flex;gap:var(--column-gap);
  padding:18px 30px 0 24px;
  overflow-x:scroll;overflow-y:hidden;min-height:0;
  scrollbar-width:none;
}
.board::-webkit-scrollbar{display:none}

/* Custom scrollbar track */
.board-scrollbar{
  position:absolute;bottom:0;left:0;right:0;
  height:6px;margin:0 30px 0 24px;
  opacity:0;transition:opacity .1s;
  z-index:10;
}
.board-scrollbar.visible{opacity:1}
.board-scrollbar-thumb{
  position:absolute;top:0;height:6px;
  background:var(--border-visible);border-radius:3px;
  min-width:40px;cursor:pointer;
  transition:background .1s;
}
.board-scrollbar-thumb:hover{background:rgba(0,0,0,.2)}

/* ═══════════ COLUMN ═══════════ */
.column{
  flex-shrink:0;width:var(--column-w);min-height:100%;
  display:flex;flex-direction:column;gap:12px;
  background:var(--bg-column);border-radius:var(--radius-lg);
  border:0.8px solid var(--border-column);
  padding:16px 8px 8px;
}
.col-header{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  height:24px;padding:0px 8px;flex-shrink:0;
}
.col-header-group{display:flex;align-items:center;gap:8px;flex:1}
.col-header .col-icon{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.col-title{
  font-family:"Boing",Inter,system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  font-size:16px;font-weight:400;color:var(--text-primary);
}
.col-count{
  font-size:12px;font-weight:400;color:var(--text-secondary);
  background:transparent;border-radius:6px;padding:0;
}
.col-action-btn{
  width:24px;height:24px;display:flex;align-items:center;justify-content:center;
  border:none;background:none;cursor:pointer;color:var(--text-secondary);
  border-radius:var(--radius-sm);transition:all var(--dur) var(--ease);
  flex-shrink:0;font-family:inherit;
}
.col-action-btn:hover{background:var(--bg-colmenu-hover);color:var(--colmenu-hover-color)}
.col-action-btn i,.col-menu-btn i{font-size:18px}

.col-menu-btn{
  width:24px;height:24px;display:flex;align-items:center;justify-content:center;
  border:none;background:none;cursor:pointer;color:var(--text-secondary);
  border-radius:var(--radius-sm);transition:all var(--dur) var(--ease);
  flex-shrink:0;font-family:inherit;
}
.col-menu-btn:hover{background:var(--bg-colmenu-hover);color:var(--colmenu-hover-color)}
.col-menu-btn i{font-size:18px}

.col-body{
  flex:1 1 0%;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;gap:8px;
  min-height:0;padding:0;scrollbar-width:none;
}
.col-body::-webkit-scrollbar{display:none}

/* ═══════════ CARD (Claire exact) ═══════════ */
.task-card{
  flex-shrink:0;width:100%;padding:16px;
  background:var(--bg-card);border-radius:var(--radius-lg);
  border:0.8px solid var(--border-card);
  box-shadow:var(--shadow-card);
  cursor:grab;display:block;
  transition:transform .25s cubic-bezier(.2,0,0,1), box-shadow .2s, border-color .2s;
}
.task-card:hover{
  border-color:var(--border-card-hover);
  box-shadow:var(--shadow-card-hover);
}
.task-card:active{transform:scale(.985)}
.task-card.dragging{opacity:.4;transform:rotate(2deg)}
.task-card.drag-target{border-color:var(--primary);box-shadow:0 0 0 2px rgba(21,21,22,.15)}
[data-theme="dark"] .task-card:hover{
  background:#1A1A1A;border:1px solid var(--border-card-hover);
}
[data-theme="dark"] .task-card.drag-target{box-shadow:0 0 0 2px rgba(241,245,249,.15)}
[data-theme="dark"] .card-desc{color:#A0A0A0}

/* Card title row */
.card-title-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.card-title{
  font-family:"Boing",Inter,system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  font-size:16px;font-weight:500;color:var(--text-primary);line-height:1.4;flex:1;margin:0;
}

/* Card description */
.card-desc{
  font-size:13px;color:#4B5563;line-height:1.5;
  margin:8px 0 16px;padding-right:32px;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}

/* Card footer (Claire: subtask count + assignee) */
.card-footer{
  display:flex;align-items:center;justify-content:space-between;margin-top:12px;
  font-size:16px;color:var(--text-primary);
}
.card-meta{display:flex;align-items:center;gap:16px;margin-right:auto}
.meta-item{display:flex;align-items:center;gap:4px;font-size:13px;color:var(--text-secondary)}
.meta-item i{font-size:18px}
.meta-item span{font-size:13px}

/* Priority icon container (Claire style) */
.pri-icon{
  display:flex;align-items:center;justify-content:center;
  width:28px;height:28px;border-radius:6px;flex-shrink:0;
  margin-left:8px;
}
.pri-icon i{font-size:16px}
.pri-urgent{background:var(--pri-urgent-bg);color:var(--pri-urgent-color)}
.pri-high{background:var(--pri-high-bg);color:var(--pri-high-color)}
.pri-medium{background:var(--pri-medium-bg);color:var(--pri-medium-color)}
.pri-low{background:var(--pri-low-bg);color:var(--pri-low-color)}

/* Assignee avatar (Claire: 24×24px, gradient bg) */
.assignee-avatar{
  width:24px;height:24px;border-radius:50%;
  background:var(--avatar-gradient);color:#fff;
  border:1.6px solid #FFFFFF;
  display:flex;align-items:center;justify-content:center;
  font-size:0;font-weight:600;flex-shrink:0;margin-left:auto;
  font-family:var(--font-display);
}

/* Card tags */
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
.card-tag{
  font-size:11px;font-weight:500;padding:2px 8px;border-radius:var(--radius-sm);
  background:var(--bg-column);color:var(--text-secondary);
  border:0.8px solid var(--border-subtle);
}

/* Progress bar */
.progress-wrap{margin-top:10px}
.progress-bar{height:4px;background:var(--bg-column);border-radius:2px;overflow:hidden}
.progress-bar .fill{height:100%;border-radius:2px;transition:width .3s}
.fill-low{background:#64748B}.fill-mid{background:#337EA9}.fill-high{background:#17B26A}

/* Dep badges */
.dep-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:10px}
.dep-badge{
  font-size:11px;padding:1px 6px;border-radius:var(--radius-sm);
  display:flex;align-items:center;gap:3px;
}
.dep-blocked{background:var(--danger-bg);color:var(--danger)}
.dep-blocking{background:var(--bg-column);color:var(--text-secondary)}
.dep-ready{background:var(--bg-column);color:var(--text-secondary)}

/* Add column placeholder (Claire: dotted border) */
.add-column-placeholder{
  background:transparent!important;border:1.6px dotted var(--border-column)!important;
  cursor:pointer;transition:all var(--dur) var(--ease);
}
.add-column-placeholder:hover{background:var(--bg-card-hover)!important;border-style:solid!important}
.add-col-inner{
  display:flex;flex-direction:column;align-items:center;gap:12px;
  margin-top:48px;color:var(--text-tertiary);font-size:14px;
}
.add-col-inner i{opacity:.4;font-size:24px}
.add-column-placeholder:hover .add-col-inner{color:var(--text-primary)}
.add-column-placeholder:hover .add-col-inner i{opacity:.7}

/* ═══════════ ADD CARD BUTTON (legacy, hidden now) ═══════════ */
.add-card-btn{display:none}

/* ═══════════ EMPTY STATE ═══════════ */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;color:var(--text-tertiary);font-size:13px;gap:8px}
.empty-state i{opacity:.3;font-size:32px}

/* ═══════════ OTHER VIEWS ═══════════ */
#gantt-view,#list-view{display:none;flex:1;overflow:auto;padding:0 24px 24px}

/* ═══════════ MODALS ═══════════ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:1000}
.modal-overlay.show{display:flex}
.modal{
  background:var(--bg-view);border:0.8px solid var(--border-visible);
  border-radius:var(--radius-xl);padding:24px;width:520px;max-height:80vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.2);
}
.modal h3{font-size:18px;font-weight:600;margin-bottom:16px;color:var(--text-primary)}
.modal label{display:block;font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:4px;margin-top:12px}
.modal input,.modal textarea,.modal select{
  width:100%;padding:8px 12px;border:0.8px solid var(--border-visible);border-radius:var(--radius-md);
  background:var(--bg-input);color:var(--text-primary);
  font-family:inherit;font-size:14px;
  transition:border-color var(--dur) var(--ease);
}
.modal input:focus,.modal textarea:focus,.modal select:focus{outline:none;border-color:var(--primary)}
.modal textarea{resize:vertical;min-height:80px}
.modal .btns{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
.modal .btns button{
  padding:8px 16px;border-radius:var(--radius-md);border:0.8px solid var(--border-visible);
  font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;
  transition:all var(--dur) var(--ease);
}
.btn-primary{background:var(--primary);color:var(--text-inverse);border-color:var(--primary)!important}
.btn-primary:hover{opacity:.9}
.btn-secondary{background:var(--bg-card);color:var(--text-primary)}
.btn-secondary:hover{background:var(--bg-card-hover)}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)!important}
.btn-danger:hover{opacity:.9}

/* Comment & timeline */
.comment-section h4,.timeline-section h4{font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:8px;margin-top:16px}
.comment-item{padding:8px 0;border-bottom:1px solid var(--border-subtle)}
.comment-item .c-author{font-size:13px;font-weight:600;color:var(--text-primary);margin-right:8px}
.comment-item .c-time{font-size:11px;color:var(--text-tertiary)}
.comment-item .c-content{font-size:13px;color:var(--text-secondary);margin-top:4px}
.comment-input-wrap{display:flex;gap:8px;margin-top:8px}
.comment-input-wrap input{flex:1}
.tl-item{display:flex;gap:8px;padding:6px 0;align-items:flex-start}
.tl-dot{width:6px;height:6px;border-radius:50%;margin-top:6px;flex-shrink:0;background:var(--border-visible)}
.tl-body{font-size:12px;color:var(--text-secondary)}
.tl-time{font-size:11px;color:var(--text-tertiary);margin-top:1px}
.tl-action{font-weight:500;color:var(--text-primary)}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--primary);color:var(--text-inverse);padding:10px 20px;border-radius:var(--radius-lg);font-size:14px;font-weight:500;z-index:2000;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}

/* Activity panel */
.activity-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);display:none;z-index:900}
.activity-overlay.show{display:block}
.activity-panel{position:fixed;top:0;right:0;width:420px;height:100vh;z-index:950;background:var(--bg-view);border-left:0.8px solid var(--border-visible);padding:24px;overflow-y:auto;transform:translateX(100%);transition:transform .25s var(--ease)}
.activity-panel.show{transform:translateX(0)}
.activity-panel h3{display:flex;justify-content:space-between;align-items:center;font-size:18px;font-weight:600;color:var(--text-primary);margin-bottom:20px}
.activity-panel .close-btn{background:none;border:none;color:var(--text-tertiary);cursor:pointer;padding:4px}
.activity-panel .close-btn:hover{color:var(--text-primary)}

/* List view */
#list-view table{width:100%;border-collapse:collapse;font-size:14px}
#list-view th{text-align:left;padding:10px 12px;font-weight:600;color:var(--text-secondary);font-size:12px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border-subtle)}
#list-view td{padding:10px 12px;border-bottom:1px solid var(--border-subtle);color:var(--text-primary)}
#list-view tr:hover td{background:var(--bg-card-hover)}
#list-view tr.subtask-row td{padding-left:32px}

/* Gantt */
.timeline{overflow-x:auto;padding:8px 0}
.gantt-row{display:flex;align-items:center;height:36px;margin:2px 0}
.gantt-label{width:200px;flex-shrink:0;font-size:13px;padding:0 12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-primary)}
.gantt-bar-bg{flex:1;height:24px;position:relative;background:var(--bg-column);border-radius:4px}
.gantt-bar{position:absolute;top:2px;height:20px;border-radius:4px;padding:0 8px;font-size:11px;line-height:20px;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-backlog{background:#9CA3AF}.bar-todo{background:#337EA9}.bar-progress{background:#D9730D}.bar-done{background:#17B26A}
.today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--danger);z-index:1}
.day-marker{flex-shrink:0;font-size:10px;color:var(--text-tertiary);line-height:24px;text-align:center}
.sync-status{font-size:12px;color:var(--text-tertiary);padding:4px 8px;display:none}
.archive-banner{display:none;padding:8px 16px;margin:0 24px;border-radius:var(--radius-md);background:var(--danger-bg);color:var(--danger);font-size:13px;font-weight:500;align-items:center;gap:8px}
.archive-banner.show{display:flex}

/* Tag filter popover */
.tag-popover{display:none;position:absolute;top:60px;right:24px;z-index:100;background:var(--bg-view);border:0.8px solid var(--border-visible);border-radius:var(--radius-lg);padding:16px;min-width:200px;box-shadow:0 8px 32px rgba(0,0,0,.12)}
#tag-popover-backdrop{display:none;position:fixed;inset:0;z-index:99}
</style>
</head>
<body>

<div class="app-root">
  <!-- ═══════════ SIDEBAR (Claire style) ═══════════ -->
  <aside class="sidebar" id="sidebar">

  <!-- ═══════════ MAIN VIEW ═══════════ -->
  <div class="main-view">

        <div class="hdr-more-wrap">
          <button class="hdr-btn" onclick="toggleMoreMenu()" title="更多"><i class="ph-fill ph-dots-three-outline-vertical"></i></button>
          <div class="hdr-more-menu" id="more-menu">
            <button onclick="exportData()"><i class="ph-fill ph-upload-simple"></i> 导出 JSON</button>
            <button onclick="document.getElementById('import-file').click()"><i class="ph-fill ph-download-simple"></i> 导入 JSON</button>
            <button onclick="triggerBackup()"><i class="ph-fill ph-floppy-disk"></i> 备份数据库</button>

    </div>

    <div class="archive-banner" id="archive-banner">此项目已归档（只读） <button onclick="toggleArchive()" style="background:none;border:none;color:var(--danger);cursor:pointer;text-decoration:underline;font-family:inherit;font-size:13px">恢复活跃</button></div>

    <!-- Tag filter popover -->

    <div id="tag-popover-backdrop" onclick="closeTagFilter()"></div>

<script>
// ══════════════════════════ JS ══════════════════════════
const S=['backlog','todo','in-progress','done'];
const SL={backlog:'Backlog',todo:'Todo','in-progress':'In Progress',done:'Done'};
const PL={5:'紧急',4:'高',3:'中',2:'低',1:'很低'};
const DAY_W=36;
let tasks=[],projects=[],editId=null,currentView='kanban',activeTag=null,activePreset=null,currentProject='default',currentProjectArchived=false,dragId=null;

// ── Theme ─────────────────────────────────────────────────
function toggleTheme(){const h=document.documentElement;const isDark=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',isDark?'':'dark');const i=document.querySelector('#theme-btn i');i.className=isDark?'ph-fill ph-moon':'ph-fill ph-sun';localStorage.setItem('tb_theme',isDark?'':'dark');}
(function(){const isDark=localStorage.getItem('tb_theme')==='dark';if(isDark){document.documentElement.setAttribute('data-theme','dark');document.querySelector('#theme-btn i').className='ph-fill ph-sun';}})();

// ── Sidebar toggle ────────────────────────────────────────
function toggleSidebar(){
  const sb=document.getElementById('sidebar');
  const btn=sb.querySelector('.sb-collapse-btn i');
  sb.classList.toggle('collapsed');
  if(sb.classList.contains('collapsed')){
    document.querySelector('.sb-collapse-btn').title='展开侧栏';
    btn.className='ph-fill ph-sidebar';
  }else{
    document.querySelector('.sb-collapse-btn').title='折叠侧栏';
    btn.className='ph-fill ph-sidebar-simple';
  }
}

// ── SVG Icons ─────────────────────────────────────────────
const I={
  check18:'<i class="ph-fill ph-check-square-offset" style="font-size:18px"></i>',
  comment18:'<i class="ph-fill ph-chat-circle" style="font-size:18px"></i>',
  cal:'<i class="ph-fill ph-calendar" style="font-size:13px"></i>',
  user:'<i class="ph-fill ph-user" style="font-size:13px"></i>',
  warn16:'<i class="ph-fill ph-warning" style="font-size:16px"></i>',
  urg16:'<i class="ph-fill ph-warning-circle" style="font-size:16px"></i>',
  paperclip:'<i class="ph-fill ph-paperclip" style="font-size:11px"></i>',
  check:'<i class="ph-fill ph-check" style="font-size:16px"></i>',
  sparkles:'<i class="ph-fill ph-sparkle" style="font-size:13px"></i>',
  edit:'<i class="ph-fill ph-pencil-simple" style="font-size:13px"></i>',
  moveRight:'<i class="ph-fill ph-arrow-right" style="font-size:13px"></i>',
  trash:'<i class="ph-fill ph-trash" style="font-size:13px"></i>',
  messageCircle:'<i class="ph-fill ph-chat-circle" style="font-size:13px"></i>',

// ── Helpers ────────────────────────────────────────────────
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,6);}
function save(){localStorage.setItem('tb_tasks',JSON.stringify(tasks));}
function parseTags(t){if(!t||!t.tags)return[];if(Array.isArray(t.tags))return t.tags.map(x=>String(x).trim()).filter(Boolean);try{const a=JSON.parse(t.tags);if(Array.isArray(a))return a.map(x=>String(x).trim()).filter(Boolean);}catch(e){}return String(t.tags).split(',').map(x=>x.trim()).filter(Boolean);}

// ── Priority icon class (Claire style: icon container, not left border) ──
function priIconClass(p){
  if(p>=5)return'pri-urgent';if(p>=4)return'pri-high';if(p>=3)return'pri-medium';if(p>=1)return'pri-low';return'';
}
function priIconSVG(p){

// ── Data ───────────────────────────────────────────────────
function load(){
  const d=localStorage.getItem('tb_tasks');
  if(d){tasks=JSON.parse(d);renderAll();}
  loadProjects().then(()=>syncFromAPI(true));
  // Project description: 200 char limit + counter + auto-save
  const MAX_DESC=200;
  const descEl=document.getElementById('tb-project-desc');
  const counterEl=document.getElementById('desc-counter');
  function updateDescCounter(){
    const len=descEl.textContent.length;
    counterEl.textContent=len+'/'+MAX_DESC;
    counterEl.classList.toggle('over',len>MAX_DESC);
  }
  descEl.addEventListener('input',function(){
    if(this.textContent.length>MAX_DESC){
      const sel=window.getSelection();const off=sel.focusOffset;
      this.textContent=this.textContent.substring(0,MAX_DESC);
      try{sel.collapse(descEl.firstChild||descEl,Math.min(off,MAX_DESC));}catch(e){}
    }
    updateDescCounter();
  });
  descEl.addEventListener('focus',function(){counterEl.classList.add('visible');updateDescCounter();});
  descEl.addEventListener('blur',async function(){
    counterEl.classList.remove('visible','over');
    const desc=this.textContent.trim().substring(0,MAX_DESC);
    const proj=projects.find(p=>p.id===currentProject);
    if(!proj||desc===(proj.description||''))return;
    proj.description=desc||null;
    if(desc)this.textContent=desc;
    try{await fetch('http://localhost:17850/api/projects/'+encodeURIComponent(currentProject),{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({description:desc||null})});}catch(e){}
  });
  descEl.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();this.blur();}});
}

async function syncFromAPI(silent){
  const st=document.getElementById('sync-status');
  if(!silent){st.style.display='inline';st.textContent='同步中…';}
  try{
    const r=await fetch('http://localhost:17850/api/tasks?status=all&project_id='+encodeURIComponent(currentProject));
    if(!r.ok)throw new Error('API '+r.status);
    const data=await r.json();
    if(Array.isArray(data)&&data.length){tasks=data;
      try{const dr=await fetch('http://localhost:17850/api/tasks/dep-summary?project_id='+encodeURIComponent(currentProject));if(dr.ok){const dm=await dr.json();tasks.forEach(t=>{const d=dm[t.id]||{blocked:0,blocking:0,children:0};t._blocked=d.blocked;t._blocking=d.blocking;t._children=d.children;});}}catch(de){}
      save();renderAll();if(!silent)st.textContent='已同步 '+data.length+' 条';}
    else{tasks=[];save();renderAll();if(!silent)st.textContent='无数据';}
  }catch(e){if(!silent)st.textContent='同步失败';}
}

// ── Filtering ──────────────────────────────────────────────
function getFilteredTasks(){
  let r=tasks;if(activeTag)r=r.filter(t=>parseTags(t).includes(activeTag));
  if(activePreset){const today=new Date().toISOString().substring(0,10);
    switch(activePreset){
      case'blocked':r=r.filter(t=>t._blocked>0);break;
      case'due-today':r=r.filter(t=>t.due_date===today);break;
      case'due-week':{const d=new Date();const dow=d.getDay();const mon=new Date(d);mon.setDate(d.getDate()-(dow===0?6:dow-1));const sun=new Date(mon);sun.setDate(mon.getDate()+6);r=r.filter(t=>t.due_date&&t.due_date>=mon.toISOString().substring(0,10)&&t.due_date<=sun.toISOString().substring(0,10));break;}
      case'in-progress':r=r.filter(t=>t.status==='in-progress');break;
      case'recent':{const ta=new Date(Date.now()-259200000).toISOString().replace('T',' ').substring(0,19);r=r.filter(t=>t.updated_at&&t.updated_at>=ta);break;}
    }
  }return r;
}
function collectTags(){const s=new Set();tasks.forEach(t=>parseTags(t).forEach(tag=>s.add(tag)));return[...s].sort();}

  const el=document.getElementById('tag-filter-popover');

  const tH=tags.length?tags.map(t=>`<span style="display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;font-size:13px;cursor:pointer;margin:2px;border:0.8px solid var(--border-subtle);${activeTag===t?'background:var(--primary);color:var(--text-inverse);border-color:var(--primary)':'background:var(--bg-card);color:var(--text-secondary)'}" onclick="filterByTag('${esc(t)}')">${esc(t)}</span>`).join('')+(activeTag?`<span style="display:inline-flex;padding:4px 10px;border-radius:999px;font-size:13px;cursor:pointer;margin:2px;background:var(--danger);color:#fff" onclick="filterByTag(null)">清除</span>`:''):'<span style="font-size:12px;color:var(--text-tertiary)">暂无标签</span>';
  const clear=(activePreset||activeTag)?`<div style="margin-top:8px"><span style="padding:4px 10px;border-radius:999px;font-size:12px;cursor:pointer;background:var(--bg-column);color:var(--text-tertiary)" onclick="applyPreset(null);filterByTag(null);closeTagFilter()">清除全部筛选</span></div>`:'';
  el.innerHTML=`<div style="margin-bottom:12px"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-tertiary);margin-bottom:6px">快速筛选</div>${pH}</div><div style="margin-bottom:4px"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-tertiary);margin-bottom:6px">标签</div>${tH}</div>${clear}`;
  updateFilterBadge();

function toggleTagFilter(){const p=document.getElementById('tag-filter-popover');const bd=document.getElementById('tag-popover-backdrop');if(p.style.display==='block'){p.style.display='none';bd.style.display='none';}else{renderTagFilter();p.style.display='block';bd.style.display='block';}}

// ── Board Rendering (Claire card style) ───────────────────
function renderBoard(){
  const g={};S.forEach(s=>g[s]=[]);
  getFilteredTasks().forEach(t=>{if(!g[t.status])return;g[t.status].push(t);});
  S.forEach(s=>{
    const el=document.getElementById('l-'+s);
    document.getElementById('c-'+s).textContent=g[s].length;
    el.setAttribute('ondragover','handleColumnDragOver(event)');
    el.setAttribute('ondragleave','handleColumnDragLeave(event)');
    el.setAttribute('ondrop','handleColumnDrop(event,"'+s+'")');
    if(!g[s].length){el.innerHTML='<div class="empty-state"><i class="ph-fill ph-kanban"></i>暂无任务</div>';return;}
    el.innerHTML=g[s].map(t=>{
      // Title row: h4 + priority icon
      const pCls=priIconClass(t.priority);
      const pIcon=priIconSVG(t.priority);
      const priEl=pIcon?`<div class="pri-icon ${pCls}">${pIcon}</div>`:'';
      const titleRow=`<div class="card-title-row"><h4 class="card-title">${esc(t.title)}</h4>${priEl}</div>`;

      // Description
      const desc=t.description?`<div class="card-desc">${esc(t.description)}</div>`:'';

      // Footer: subtask count (if any) + due date (as meta) + assignee avatar
      const subtaskCount=t._children||0;
      const commentCount=0; // placeholder — would need API to get real count
      const metaItems=[];
      if(subtaskCount>0)metaItems.push(`<div class="meta-item">${I.check18}<span>${subtaskCount}</span></div>`);
      if(t.due_date)metaItems.push(`<div class="meta-item">${I.cal}${t.due_date}</div>`);
      const metaHTML=metaItems.length?`<div class="card-meta">${metaItems.join('')}</div>`:'';

      const initials=t.assigned_to?(t.assigned_to.substring(0,2).toUpperCase()):'';
      const assigneeEl=initials?`<div class="assignee-avatar">${esc(initials)}</div>`:'';

      const footer=(metaHTML||assigneeEl)?`<div class="card-footer">${metaHTML}${assigneeEl}</div>`:'';

      // Tags
      const tags=parseTags(t);
      const tagsHTML=tags.length?`<div class="card-tags">${tags.map(tag=>`<span class="card-tag">${esc(tag)}</span>`).join('')}</div>`:'';

      // Progress
      const pct=t.progress||0;
      const pClass=pct>=70?'fill-high':pct>=30?'fill-mid':'fill-low';
      const progress=pct>0?`<div class="progress-wrap"><div class="progress-bar"><div class="fill ${pClass}" style="width:${pct}%"></div></div></div>`:'';

      // Dep badges
      const depsHTML=[];
      if(t._blocked>0)depsHTML.push(`<span class="dep-badge dep-blocked">被阻塞 ×${t._blocked}</span>`);
      if(t._blocking>0)depsHTML.push(`<span class="dep-badge dep-blocking">阻塞中 ×${t._blocking}</span>`);

      return `<div class="task-card" draggable="true" data-id="${t.id}"
        onclick="openModal(null,'${t.id}')"
        ondragstart="handleDragStart(event,'${t.id}')"
        ondragend="handleDragEnd(event)"
        ondragover="handleCardDragOver(event,'${t.id}')"
        ondragleave="handleCardDragLeave(event)">
        ${titleRow}
        ${desc}
        ${footer}
        ${tagsHTML}
        ${progress}
        ${depsHTML.length?`<div class="dep-badges">${depsHTML.join('')}</div>`:''}
      </div>`;
    }).join('');
  });
}

// ── Drag & Drop ─────────────────────────────────────────────
function handleDragStart(e,id){if(currentProjectArchived){e.preventDefault();return;}dragId=id;e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',id);e.currentTarget.classList.add('dragging');}
function handleDragEnd(e){e.currentTarget.classList.remove('dragging');document.querySelectorAll('.drag-target,.drag-over').forEach(el=>el.classList.remove('drag-target','drag-over'));dragId=null;}

function handleColumnDragLeave(e){e.currentTarget.classList.remove('drag-over');}
async function handleColumnDrop(e,status){e.preventDefault();e.currentTarget.classList.remove('drag-over');if(!dragId)return;const id=dragId;const t=tasks.find(x=>x.id===id);if(!t||t.status===status)return;t.status=status;save();renderAll();try{await fetch('http://localhost:17850/api/tasks/'+id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})});}catch(e){toast('同步失败');syncFromAPI(true);}}
function handleCardDragOver(e,id){e.preventDefault();e.stopPropagation();if(id!==dragId)e.currentTarget.classList.add('drag-target');}

// ── View Switching ──────────────────────────────────────────
function switchView(v){
  currentView=v;
  document.querySelectorAll('.sidebar-nav-item').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.sidebar-nav-item').forEach(b=>{const t=b.textContent.trim();if((v==='kanban'&&t==='看板任务')||(v==='gantt'&&t==='甘特图')||(v==='list'&&t==='列表'))b.classList.add('active');});
  document.getElementById('kanban-view').style.display=v==='kanban'?'flex':'none';
  document.getElementById('gantt-view').style.display=v==='gantt'?'block':'none';
  document.getElementById('list-view').style.display=v==='list'?'block':'none';
  if(v==='gantt')renderGantt();
  if(v==='list')renderList();
}
function renderGantt(){
  const el=document.getElementById('timeline');const filtered=getFilteredTasks();const dated=filtered.filter(t=>t.start_date||t.due_date);
  if(!dated.length){el.innerHTML='<div class="empty-state">暂无带日期的任务</div>';return;}
  const today=new Date();today.setHours(0,0,0,0);
  let dates=[];dated.forEach(t=>{if(t.start_date)dates.push(new Date(t.start_date));if(t.due_date)dates.push(new Date(t.due_date));});
  let min=new Date(Math.min(...dates.map(d=>d.getTime()))),max=new Date(Math.max(...dates.map(d=>d.getTime())));
  min.setDate(min.getDate()-2);max.setDate(max.getDate()+4);
  const td=Math.ceil((max-min)/86400000)+1;
  const days=[];for(let i=0;i<td;i++){const d=new Date(min);d.setDate(d.getDate()+i);days.push(d);}
  const to=Math.ceil((today-min)/86400000);
  let h=`<div class="gantt-row"><div class="gantt-label"></div><div class="gantt-bar-bg" style="display:flex;position:relative">${days.map(d=>`<div class="day-marker" style="width:${DAY_W}px">${d.getMonth()+1}/${d.getDate()}</div>`).join('')}<div class="today-line" style="left:${to*DAY_W}px"></div></div></div>`;
  dated.forEach(t=>{
    const sd=t.start_date?new Date(t.start_date):new Date(t.due_date);
    const ed=t.due_date?new Date(t.due_date):new Date(t.start_date);ed.setDate(ed.getDate()+1);
    const so=Math.max(0,Math.ceil((sd-min)/86400000));
    const bd=Math.max(1,Math.ceil((ed-sd)/86400000));
    const bc=t.status==='done'?'bar-done':t.status==='in-progress'?'bar-progress':t.status==='todo'?'bar-todo':'bar-backlog';
    h+=`<div class="gantt-row"><div class="gantt-label" title="${esc(t.title)}">${esc(t.title)}</div><div class="gantt-bar-bg"><div class="gantt-bar ${bc}" style="left:${so*DAY_W}px;width:${bd*DAY_W-3}px">${esc(t.title.length>20?t.title.substring(0,20)+'…':t.title)}</div></div></div>`;
  });
  el.innerHTML=h;
}
function renderList(){
  const filtered=getFilteredTasks();
  const children={};filtered.forEach(t=>{if(t.parent_id){if(!children[t.parent_id])children[t.parent_id]=[];children[t.parent_id].push(t);}});
  function renderRow(t,depth=0){
    const indent=depth>0?'<span style="color:var(--text-tertiary)">'+'└ '.repeat(depth)+'</span>':'';
    const deps=[];if(t._blocked>0)deps.push(`<span class="dep-badge dep-blocked">被阻塞 ×${t._blocked}</span>`);if(t._blocking>0)deps.push(`<span class="dep-badge dep-blocking">阻塞中 ×${t._blocking}</span>`);
    const cls=depth>0?' class="subtask-row"':'';
    let html=`<tr${cls} onclick="openModal(null,'${t.id}')" style="cursor:pointer"><td>${indent}${esc(t.title)} ${deps.join(' ')}</td><td>${SL[t.status]}</td><td>${PL[t.priority]||'-'}</td><td>${t.progress}%</td><td>${t.due_date||'-'}</td><td>${esc(t.assigned_to||'')}</td></tr>`;
    if(children[t.id])children[t.id].forEach(c=>{html+=renderRow(c,depth+1);});
    return html;
  }
  const roots=filtered.filter(t=>!t.parent_id||!filtered.find(x=>x.id===t.parent_id));
  document.getElementById('list-tbody').innerHTML=roots.map(t=>renderRow(t,0)).join('');
}

// ── Modal ───────────────────────────────────────────────────
function openModal(status,id){

  document.getElementById('f-status').value=t?t.status:(status||'backlog');
  document.getElementById('f-priority').value=t?t.priority:3;
  document.getElementById('f-progress').value=t?t.progress:0;
  document.getElementById('f-start').value=t&&t.start_date||'';
  document.getElementById('f-due').value=t&&t.due_date||'';
  document.getElementById('f-assignee').value=t&&t.assigned_to||'';
  document.getElementById('f-tags').value=t?parseTags(t).join(', '):'';
  document.getElementById('btn-delete').style.display=t?'':'none';

function saveTask(){
  const data={title:document.getElementById('f-title').value.trim(),description:document.getElementById('f-desc').value.trim(),status:document.getElementById('f-status').value,priority:parseInt(document.getElementById('f-priority').value),progress:parseInt(document.getElementById('f-progress').value)||0,start_date:document.getElementById('f-start').value||null,due_date:document.getElementById('f-due').value||null,assigned_to:document.getElementById('f-assignee').value.trim()||null,tags:document.getElementById('f-tags').value.trim().split(',').map(t=>t.trim()).filter(Boolean),project_id:currentProject};
  if(!data.title){toast('请输入标题');return;}
  if(data.status==='done')data.progress=100;
  (async()=>{try{
    if(editId){const r=await fetch('http://localhost:17850/api/tasks/'+editId,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});if(!r.ok)throw new Error(r.status);}
    else{const r=await fetch('http://localhost:17850/api/tasks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});if(!r.ok)throw new Error(r.status);}
    closeModal();syncFromAPI(true);toast(editId?'已更新':'已创建');
  }catch(e){toast('保存失败: '+e.message);}})();
}

async function loadComments(taskId){const el=document.getElementById('comment-list');try{const r=await fetch('http://localhost:17850/api/tasks/'+taskId+'/comments');if(!r.ok){el.innerHTML='';return;}const comments=await r.json();if(!comments.length){el.innerHTML='<div style="color:var(--text-tertiary);font-size:12px">暂无评论</div>';return;}el.innerHTML=comments.map(c=>{const time=c.created_at?new Date(c.created_at.replace(' ','T')+'Z').toLocaleString('zh-CN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';return`<div class="comment-item"><span class="c-author">${esc(c.author||'未知')}</span><span class="c-time">${time}</span><div class="c-content">${esc(c.content)}</div></div>`;}).join('');}catch(e){el.innerHTML='';}}
async function addComment(){if(!editId)return;const input=document.getElementById('comment-input');const content=input.value.trim();if(!content)return;try{const r=await fetch('http://localhost:17850/api/tasks/'+editId+'/comments',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content})});if(!r.ok)throw new Error(r.status);input.value='';loadComments(editId);loadModalTimeline(editId);}catch(e){toast('评论失败: '+e.message);}}
async function loadModalTimeline(taskId){const el=document.getElementById('modal-timeline');try{const r=await fetch('http://localhost:17850/api/tasks/'+taskId+'/context');if(!r.ok){el.innerHTML='';return;}const ctx=await r.json();if(!ctx.recent_activity||!ctx.recent_activity.length){el.innerHTML='<div style="color:var(--text-tertiary);font-size:11px">暂无活动</div>';return;}const icons={created:I.sparkles,updated:I.edit,moved:I.moveRight,deleted:I.trash,comment_added:I.messageCircle,dependency_added:I.link,dependency_removed:I.scissors};const labels={created:'创建',updated:'更新',moved:'移动',deleted:'删除',comment_added:'评论',dependency_added:'添加依赖',dependency_removed:'删除依赖'};el.innerHTML=ctx.recent_activity.slice(0,8).map(a=>{const time=a.created_at?new Date(a.created_at.replace(' ','T')+'Z').toLocaleString('zh-CN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';const cls=a.action||'updated';let detail='';if(a.field&&a.action==='updated'){const ov=a.old_value&&a.old_value!=='null'?(a.old_value.length>15?a.old_value.substring(0,15)+'…':a.old_value):'空';const nv=a.new_value&&a.new_value!=='null'?(a.new_value.length>15?a.new_value.substring(0,15)+'…':a.new_value):'空';detail=`<span style="color:var(--text-tertiary)">${a.field}: ${esc(ov)} → ${esc(nv)}</span>`;}else if(a.action==='moved'){detail=`<span style="color:var(--text-tertiary)">${a.old_value||'?'} → ${a.new_value||'?'}</span>`;}return`<div class="tl-item"><div class="tl-dot"></div><div class="tl-body"><span class="tl-action">${labels[a.action]||a.action}</span> ${detail}<div class="tl-time">${time}${a.actor?` · ${esc(a.actor)}`:''}</div></div></div>`;}).join('');}catch(e){el.innerHTML='';}}

// ── Projects ────────────────────────────────────────────────
async function loadProjects(){try{const r=await fetch('http://localhost:17850/api/projects');if(!r.ok)return;projects=await r.json();}catch(e){projects=[{id:'default',name:'默认项目',color:'#6366f1'}];}try{const ar=await fetch('http://localhost:17850/api/projects?archived=1');if(ar.ok)window._archivedProjects=await ar.json();}catch(e){window._archivedProjects=[];}renderProjectList();}
function switchProject(id){currentProject=id;const inArchived=window._archivedProjects?.find(p=>p.id===id);currentProjectArchived=!!inArchived;updateArchiveUI();updateProjectName();renderProjectList();syncFromAPI(true);}
function updateProjectName(){const el=document.getElementById('tb-project-name');const desc=document.getElementById('tb-project-desc');const proj=projects.find(p=>p.id===currentProject);if(proj){el.textContent=proj.name;desc.textContent=proj.description||'';}updateProjectIcon();}
const PROJ_ICONS=['buildings','rocket-launch','briefcase','code','paint-brush-broad','chart-line-up','globe','flask','star','heartbeat','graduation-cap','cube'];
function getProjectIcon(pid){try{const map=JSON.parse(localStorage.getItem('tb_proj_icons')||'{}');return map[pid]||'buildings';}catch(e){return 'buildings';}}
function setProjectIcon(pid,icon){try{const map=JSON.parse(localStorage.getItem('tb_proj_icons')||'{}');map[pid]=icon;localStorage.setItem('tb_proj_icons',JSON.stringify(map));}catch(e){}}
function updateProjectIcon(){const el=document.getElementById('proj-icon');const wrap=document.getElementById('proj-icon')?.parentElement;if(!el||!wrap)return;const icon=getProjectIcon(currentProject);el.className='ph-fill proj-icon ph-'+icon;const proj=projects.find(p=>p.id===currentProject);wrap.style.background=proj?.color||'#6366f1';}
function cycleProjectIcon(){const cur=getProjectIcon(currentProject);const idx=PROJ_ICONS.indexOf(cur);const next=PROJ_ICONS[(idx+1)%PROJ_ICONS.length];setProjectIcon(currentProject,next);updateProjectIcon();
  try{fetch('http://localhost:17850/api/projects/'+encodeURIComponent(currentProject),{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({icon:next})});}catch(e){}}
function updateArchiveUI(){const btn=document.getElementById('archive-btn');const banner=document.getElementById('archive-banner');if(currentProjectArchived){btn.style.display='';btn.innerHTML='<i class="ph-fill ph-archive"></i> 恢复';banner.classList.add('show');document.querySelectorAll('.add-card-btn').forEach(el=>el.style.display='none');}else{btn.style.display='';btn.innerHTML='<i class="ph-fill ph-archive"></i> 归档';banner.classList.remove('show');document.querySelectorAll('.add-card-btn').forEach(el=>el.style.display='');}}
async function toggleArchive(){const pid=currentProject;if(currentProjectArchived){try{const r=await fetch('http://localhost:17850/api/projects/'+encodeURIComponent(pid)+'/unarchive',{method:'POST'});if(!r.ok)throw new Error(r.status);currentProjectArchived=false;updateArchiveUI();await loadProjects();toast(I.check+' 项目已恢复');}catch(e){toast('恢复失败: '+e.message);}}else{if(!confirm('归档项目后所有任务变为只读，确定？'))return;try{const r=await fetch('http://localhost:17850/api/projects/'+encodeURIComponent(pid)+'/archive',{method:'POST'});if(!r.ok)throw new Error(r.status);currentProjectArchived=true;updateArchiveUI();await loadProjects();toast(I.archive+' 项目已归档');}catch(e){toast('归档失败: '+e.message);}}}
function showProjectModal(){document.getElementById('project-modal-title').textContent='新建项目';document.getElementById('f-proj-name').value='';document.getElementById('f-proj-desc').value='';document.getElementById('f-proj-color').value='#6366f1';document.getElementById('project-modal-overlay').classList.add('show');}
function closeProjectModal(){document.getElementById('project-modal-overlay').classList.remove('show');}
async function saveProject(){const name=document.getElementById('f-proj-name').value.trim();if(!name){toast('请输入项目名称');return;}try{const r=await fetch('http://localhost:17850/api/projects',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,description:document.getElementById('f-proj-desc').value.trim()||null,color:document.getElementById('f-proj-color').value})});if(!r.ok)throw new Error(r.status);const p=await r.json();currentProject=p.id;closeProjectModal();await loadProjects();syncFromAPI(true);toast('项目已创建');}catch(e){toast('创建失败: '+e.message);}}

// ── Activity Log ────────────────────────────────────────────
function toggleActivity(){const panel=document.getElementById('activity-panel');const overlay=document.getElementById('activity-overlay');if(panel.classList.contains('show')){panel.classList.remove('show');overlay.classList.remove('show');}else{panel.classList.add('show');overlay.classList.add('show');loadActivityLog();}}
async function loadActivityLog(){const el=document.getElementById('activity-list');el.innerHTML='<div style="color:var(--text-tertiary);font-size:13px">加载中…</div>';try{const r=await fetch('http://localhost:17850/api/activity-log?project_id='+encodeURIComponent(currentProject)+'&limit=80');if(!r.ok)throw new Error(r.status);const log=await r.json();if(!log.length){el.innerHTML='<div style="color:var(--text-tertiary);font-size:13px">暂无活动记录</div>';return;}const icons={created:I.sparkles,updated:I.edit,moved:I.moveRight,deleted:I.trash};const labels={created:'创建',updated:'更新',moved:'移动',deleted:'删除'};const fields={title:'标题',description:'描述',status:'状态',priority:'优先级',progress:'进度',start_date:'开始日期',due_date:'截止日期',assigned_to:'负责人',tags:'标签',completed_at:'完成时间'};el.innerHTML=log.map(a=>{const icon=icons[a.action]||I.paperclip;const title=a.task_title||'(已删除)';const time=a.created_at?new Date(a.created_at.replace(' ','T')+'Z').toLocaleString('zh-CN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';let change='';if(a.field&&a.action!=='created'){const fn=fields[a.field]||a.field;const ov=a.old_value&&a.old_value!=='null'?esc(a.old_value.length>20?a.old_value.substring(0,20)+'…':a.old_value):'空';const nv=a.new_value&&a.new_value!=='null'?esc(a.new_value.length>20?a.new_value.substring(0,20)+'…':a.new_value):'空';change=`<span style="color:var(--text-tertiary);font-size:12px">${fn}: ${ov} → ${nv}</span>`;}return`<div class="tl-item"><div class="tl-dot"></div><div class="tl-body"><span class="tl-action">${esc(title)}</span> ${change}<div class="tl-time">${time} · ${labels[a.action]||a.action}</div></div></div>`;}).join('');}catch(e){el.innerHTML='<div style="color:var(--text-tertiary);font-size:13px">加载失败</div>';}}

// ── Backup & Import/Export ──────────────────────────────────
async function triggerBackup(){toast('备份中…');try{const r=await fetch('http://localhost:17850/api/backup',{method:'POST'});const data=await r.json();toast(data.success?'备份完成':'备份失败');}catch(e){toast('备份失败');}}
function exportData(){const blob=new Blob([JSON.stringify(tasks,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='tasks-export-'+new Date().toISOString().substring(0,10)+'.json';a.click();toast('已导出');}
function importData(event){const file=event.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(e){try{const data=JSON.parse(e.target.result);if(!Array.isArray(data)){toast('格式错误');return;}data.forEach(t=>{t.id=t.id||uid();if(!tasks.find(x=>x.id===t.id))tasks.push(t);});save();renderAll();syncFromAPI(true);toast('已导入 '+data.length+' 条');}catch(err){toast('解析失败');}};reader.readAsText(file);event.target.value='';}

// ── Toast ───────────────────────────────────────────────────
function toast(msg){const el=document.getElementById('toast');el.innerHTML=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2000);}

// ── Board scrollbar (custom, appears near bottom) ──
(function(){
  const board=document.getElementById('kanban-view');
  const track=document.getElementById('board-scrollbar');
  const thumb=document.getElementById('board-scrollbar-thumb');
  const body=document.querySelector('.main-view');
  let dragging=false,startX=0,startScroll=0;

  function updateThumb(){
    const r=board.scrollWidth/board.clientWidth;
    thumb.style.width=Math.max(40,100/r)+'px';
    const pct=board.scrollLeft/(board.scrollWidth-board.clientWidth||1);
    thumb.style.left=pct*(track.clientWidth-thumb.offsetWidth)+'px';
  }

  board.addEventListener('scroll',updateThumb);
  new ResizeObserver(updateThumb).observe(board);

  // Drag to scroll
  thumb.addEventListener('mousedown',e=>{
    dragging=true;startX=e.clientX;startScroll=board.scrollLeft;
    thumb.style.background='rgba(0,0,0,.2)';e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    const dx=e.clientX-startX;
    const ratio=(board.scrollWidth-board.clientWidth)/(track.clientWidth-thumb.offsetWidth||1);
    board.scrollLeft=startScroll+dx*ratio;
  });
  document.addEventListener('mouseup',()=>{
    if(dragging){dragging=false;thumb.style.background='';updateThumb();}
  });

  // Show/hide on mouse proximity
  body.addEventListener('mousemove',e=>{
    const rect=track.getBoundingClientRect();
    track.classList.toggle('visible',Math.abs(e.clientY-rect.top)<36);
  });
  // Also show when mouse is over the track itself
  track.addEventListener('mouseenter',()=>track.classList.add('visible'));
  track.addEventListener('mouseleave',()=>track.classList.remove('visible'));

  // Only show for kanban view
  new MutationObserver(()=>{
    track.style.display=board.style.display;
    if(board.style.display!=='none')updateThumb();
  }).observe(board,{attributes:true,attributeFilter:['style']});

  updateThumb();
})();

load();
